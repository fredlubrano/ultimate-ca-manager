{{- /*
App secrets. UCM_SECRET_KEY / UCM_JWT_SECRET are generated once and persisted
across upgrades by reading back the existing Secret, so user sessions survive
restarts. Explicit values in .Values.secrets take precedence.
*/ -}}
{{- $secretName := include "ucm.secretName" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) | default dict -}}
{{- $existingData := $existing.data | default dict -}}
{{- $secretKey := .Values.secrets.secretKey -}}
{{- if not $secretKey }}{{- $secretKey = (get $existingData "UCM_SECRET_KEY" | b64dec) | default (randAlphaNum 48) -}}{{- end -}}
{{- $jwtSecret := .Values.secrets.jwtSecret -}}
{{- if not $jwtSecret }}{{- $jwtSecret = (get $existingData "UCM_JWT_SECRET" | b64dec) | default (randAlphaNum 48) -}}{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "ucm.labels" . | nindent 4 }}
type: Opaque
stringData:
  UCM_SECRET_KEY: {{ $secretKey | quote }}
  UCM_JWT_SECRET: {{ $jwtSecret | quote }}
  {{- if .Values.initialAdminPassword }}
  INITIAL_ADMIN_PASSWORD: {{ .Values.initialAdminPassword | quote }}
  {{- end }}
  {{- if and (eq .Values.database.type "postgresql") .Values.database.databaseUrl (not .Values.database.existingSecret) }}
  DATABASE_URL: {{ .Values.database.databaseUrl | quote }}
  {{- end }}
