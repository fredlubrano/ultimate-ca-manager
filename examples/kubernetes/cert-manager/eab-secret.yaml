# Secret holding the EAB HMAC issued by UCM.
#
# Get the values from UCM:
#   1. Log in as admin → ACME → EAB Credentials → "Create credential".
#   2. UCM returns once: { kid: "...", hmac: "..." } (urlsafe-base64).
#      The HMAC is shown ONLY at creation; UCM stores a hash.
#   3. Put `kid` into the ClusterIssuer's externalAccountBinding.keyID.
#   4. Put `hmac` (raw, NO base64 re-encode) into this secret's `hmac`
#      key — cert-manager expects a urlsafe-base64 string here, which is
#      exactly what UCM gives you.
#
# UCM EAB credentials have a lifecycle:
#   active → used (after first successful registration) | revoked
# Once "used" or "revoked", the same credential cannot register a new
# ACME account. Renewals reuse the existing account, no EAB needed.
#
# Rotating EAB:
#   - Create a new credential in UCM.
#   - Update this secret + ClusterIssuer.keyID.
#   - Delete the cert-manager account secret (ucm-acme-dns01-account-key)
#     so cert-manager re-registers with the new EAB.
---
apiVersion: v1
kind: Secret
metadata:
  name: ucm-acme-eab
  namespace: cert-manager
type: Opaque
stringData:
  # urlsafe-base64 (no padding) — paste verbatim from UCM
  hmac: REPLACE_WITH_HMAC_FROM_UCM
