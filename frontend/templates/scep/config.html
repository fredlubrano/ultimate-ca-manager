{% extends "base.html" %}

{% block title %}SCEP Configuration - UCM{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; gap: 1.5rem;">
    <h1 style="font-size: 1.875rem; font-weight: 600; color: var(--text-primary); margin: 0; display: flex; align-items: center; gap: 0.5rem;">
        <svg class="ucm-icon" width="24" height="24"><use href="#icon-scep"/></svg>
        <span>SCEP Configuration</span>
    </h1>
    
    <!-- Configuration Form -->
    <div id="scep-config-card" class="card"
         hx-get="/api/ui/scep/config-form"
         hx-trigger="load, reload"
         hx-swap="innerHTML">
        <div style="height: 8rem; background: var(--bg-secondary); border-radius: 0.25rem; animation: pulse 2s infinite;"></div>
    </div>
    
    <!-- SCEP Requests -->
    <div class="card" style="padding: 0;">
        <div class="card-header">
            <h2 style="font-size: 1.25rem; font-weight: 600; color: var(--text-primary);">
                <svg class="ucm-icon" width="24" height="24"><use href="#icon-list"/></svg> SCEP Enrollment Requests
            </h2>
        </div>
        <div id="scep-requests"
             hx-get="/api/ui/scep/requests"
             hx-trigger="load, refreshSCEP from:body"
             hx-swap="innerHTML">
            <div style="padding: 2rem;"><div style="height: 5rem; background: var(--bg-secondary); border-radius: 0.25rem; animation: pulse 2s infinite;"></div></div>
        </div>
    </div>
</div>

<style>
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}
</style>
{% endblock %}
