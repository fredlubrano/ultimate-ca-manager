name: Test Channel — RC Build Sanity

# Runs on every push to the `test` branch.
# Builds a DEB package as a workflow artifact (NO publish, NO release).
# This catches packaging regressions BEFORE we tag a -rcN release.
#
# To actually publish an RC: bump VERSION on `test` to `X.Y-rcN`, commit, then
# `git tag vX.Y-rcN && git push origin vX.Y-rcN`. That triggers build-release.yml
# which publishes to GitHub Releases as a pre-release.

on:
  push:
    branches: [test]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-deb-sanity:
    name: DEB Build Sanity (no publish)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION)
          DEB_VERSION=$(echo "$VERSION" | sed 's/-/~/g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "deb_version=$DEB_VERSION" >> $GITHUB_OUTPUT
          echo "Building sanity DEB for: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper fakeroot devscripts dh-python python3-all

      - name: Stamp packaging changelog
        run: |
          DATE=$(date -R)
          cat > packaging/debian/changelog << EOF
          ucm (${{ steps.version.outputs.deb_version }}) unstable; urgency=medium

            * Test-channel sanity build for ${{ steps.version.outputs.version }}

           -- UCM Team <support@ucm.local>  $DATE

          EOF

      - name: Build DEB package
        run: |
          ln -s packaging/debian debian
          dpkg-buildpackage -us -uc -b
          mv ../ucm_*.deb .
          ls -la ucm_*.deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-sanity-${{ steps.version.outputs.version }}
          path: ucm_*.deb
          retention-days: 14

  rc-reminder:
    name: Release Candidate Reminder
    runs-on: ubuntu-latest
    needs: build-deb-sanity
    steps:
      - name: Print next-step instructions
        run: |
          cat <<'EOF'
          ============================================================
          DEB sanity build OK on `test`.

          To publish a Release Candidate:
            1. On the `test` branch, set VERSION to e.g. 2.137-rc1
            2. Update frontend/package.json + package-lock.json to match
            3. Commit and push
            4. git tag v2.137-rc1 && git push origin v2.137-rc1
            5. build-release.yml will publish DEB/RPM/Docker as a GitHub
               pre-release (NOT marked as latest).

          Run the maintainer-local smoke-test matrix before promoting to stable.
          ============================================================
          EOF
